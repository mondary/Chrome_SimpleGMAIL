<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 12 - Vertical Split</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; height: 100vh; display: flex; }
        .col { height: 100%; border-right: 1px solid #eee; transition: width 0.6s ease; overflow: hidden; position: relative; }
        .col:hover { width: 50% !important; }
        .col:nth-child(1) { width: 20%; background: #f9f9f9; }
        .col:nth-child(2) { width: 20%; background: #fff; }
        .col:nth-child(3) { width: 60%; background: #fff; border-right: none; }
        .label { position: absolute; top: 40px; left: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
    </div>
</head>
<body>
    <div class="col">
        <span class="label">Folders</span>
        <div class="p-10 pt-32 space-y-4">
            <div class="font-bold text-2xl">Inbox</div>
            <div class="opacity-30 text-2xl">Sent</div>
            <div class="opacity-30 text-2xl">Drafts</div>
        </div>
    </div>
    <div class="col">
        <span class="label">Messages</span>
        <div class="p-10 pt-32 space-y-12">
            <div>
                <div class="text-xs font-bold opacity-30">09:12</div>
                <div class="text-xl font-bold">Stripe</div>
            </div>
            <div>
                <div class="text-xs font-bold opacity-30">12:45</div>
                <div class="text-xl font-bold">OpenAI</div>
            </div>
        </div>
    </div>
    <div class="col">
        <span class="label">Reading</span>
        <div class="p-20 pt-40 max-w-2xl">
            <h1 class="text-6xl font-bold tracking-tighter mb-10">The money is moving.</h1>
            <p class="text-xl leading-relaxed text-gray-400">Everything we talked about is now happening. The scale of this payout confirms the growth we projected last quarter.</p>
        </div>
    </div>
</body>
</html>
