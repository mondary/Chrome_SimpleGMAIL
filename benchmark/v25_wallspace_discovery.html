<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WallSpace - Discovery v25 Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0b;
            color: white;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
        }
        .carousel-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .carousel-item:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden">

    <!-- App Window Frame -->
    <div class="h-full w-full bg-slate-900 flex items-center justify-center p-4 md:p-12">
        <div class="relative w-full h-full max-w-7xl rounded-3xl overflow-hidden shadow-2xl bg-black flex flex-col">
            
            <!-- OS Window Controls -->
            <div class="absolute top-4 left-6 flex gap-2 z-50">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>

            <!-- BACKGROUND LAYER -->
            <div class="absolute inset-0 z-0 transition-all duration-1000" 
                 style="background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center;">
                <div class="absolute inset-0 hero-gradient"></div>
            </div>

            <!-- CONTENT LAYER -->
            <div class="relative z-10 h-full flex flex-col justify-between p-8 md:px-12">
                
                <!-- HEADER -->
                <header class="flex items-center justify-between w-full">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 bg-white rounded-sm flex items-center justify-center">
                            <span class="material-symbols-outlined text-black text-xs">star</span>
                        </div>
                        <span class="text-lg font-semibold tracking-tight">Wallspace</span>
                    </div>

                    <div class="flex items-center gap-4">
                        <div class="glass rounded-full p-1 flex items-center">
                            <button class="px-4 py-1.5 rounded-full bg-white text-black text-xs font-bold transition-all">Home</button>
                            <button class="px-4 py-1.5 rounded-full text-white/80 text-xs font-medium hover:text-white transition-all">Explore</button>
                            <button class="px-4 py-1.5 rounded-full text-white/80 text-xs font-medium hover:text-white transition-all">Library</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="glass w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                <span class="material-symbols-outlined text-sm">redeem</span>
                            </button>
                            <button class="glass w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                <span class="material-symbols-outlined text-sm">search</span>
                            </button>
                            <button class="glass px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider hover:bg-white/20 transition-all">PRO</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="glass w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                            <button class="glass w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                <span class="material-symbols-outlined text-sm">settings</span>
                            </button>
                        </div>
                    </div>
                </header>

                <!-- HERO SECTION (Centered Vertically) -->
                <div class="flex flex-col justify-center my-auto max-w-xl">
                    <span class="text-[10px] uppercase tracking-[0.3em] font-bold text-white/60 mb-2 block">Featured</span>
                    <h1 class="text-5xl md:text-6xl font-bold text-white leading-tight mb-4 drop-shadow-lg">Red Porsche 911 GT3</h1>
                    <div class="flex items-center gap-3 text-xs text-white/50 mb-6">
                        <span>Cars</span>
                        <span>•</span>
                        <span>3840x2160</span>
                        <span>•</span>
                        <span>25MB</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="glass px-6 py-3 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-white/20 transition-all">
                            View Wallpaper <span class="material-symbols-outlined text-xs">open_in_full</span>
                        </button>
                        <button class="glass w-12 h-12 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                            <span class="material-symbols-outlined text-lg">favorite</span>
                        </button>
                    </div>
                </div>

                <!-- BOTTOM CONTENT -->
                <div class="flex flex-col gap-8 mb-4">
                    <!-- Small Carousel -->
                    <div class="carousel-container gap-4 h-32">
                        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=300&q=80" class="carousel-item w-40 h-full rounded-xl object-cover cursor-pointer border border-white/10">
                        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=300&q=80" class="carousel-item w-40 h-full rounded-xl object-cover cursor-pointer border border-white/10">
                        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=300&q=80" class="carousel-item w-40 h-full rounded-xl object-cover cursor-pointer border border-white/10">
                        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80" class="carousel-item w-40 h-full rounded-xl object-cover cursor-pointer border border-white/10">
                        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=300&q=80" class="carousel-item w-40 h-full rounded-xl object-cover cursor-pointer border border-white/10">
                    </div>

                    <!-- Wallspace's Pick -->
                    <div class="flex flex-col gap-4">
                        <div class="flex justify-between items-end">
                            <div>
                                <h2 class="text-xl font-bold text-white">Wallspace's Pick</h2>
                                <p class="text-xs text-white/50">Curated selection of the finest wallpapers</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="scrollCarousel('picks', -300)" class="glass w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                    <span class="material-symbols-outlined text-sm">chevron_left</span>
                                </button>
                                <button onclick="scrollCarousel('picks', 300)" class="glass w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                                    <span class="material-symbols-outlined text-sm">chevron_right</span>
                                </button>
                            </div>
                        </div>
                        <div id="picks" class="carousel-container gap-6 h-48">
                            <div class="carousel-item w-72 h-full rounded-2xl overflow-hidden relative group cursor-pointer border border-white/10">
                                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                                <div class="absolute top-3 right-3 bg-black/50 backdrop-blur-md px-2 py-1 rounded-md text-[10px] font-bold text-white border border-white/10">PRO</div>
                            </div>
                            <div class="carousel-item w-72 h-full rounded-2xl overflow-hidden relative group cursor-pointer border border-white/10">
                                <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                            </div>
                            <div class="carousel-item w-72 h-full rounded-2xl overflow-hidden relative group cursor-pointer border border-white/10">
                                <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                            </div>
                            <div class="carousel-item w-72 h-full rounded-2xl overflow-hidden relative group cursor-pointer border border-white/10">
                                <img src="https://images.unsplash.com/photo-1501854140801-50705a6970ba?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function scrollCarousel(id, amount) {
            const el = document.getElementById(id);
            el.scrollBy({ left: amount, behavior: 'smooth' });
        }
    </script>
</body>
</html>
