<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith Mail - v23 Refined Immersive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .transition-all { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .view-transition { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body class="h-screen flex">

    <!-- Sidebar / List Mode -->
    <aside id="list-view" class="w-1/3 border-r border-stone-200 overflow-y-auto flex flex-col">
        <div class="p-6 border-b border-stone-100 font-bold text-lg">Boîte de réception</div>
        <div id="inbox-list" class="divide-y divide-stone-100"></div>
    </aside>

    <!-- Immersive Reader -->
    <main id="reader-view" class="w-2/3 h-full flex flex-col bg-white">
        <!-- Mail Toolbar -->
        <header class="p-6 flex justify-between items-center border-b border-stone-100">
            <div class="flex items-center gap-3">
                <button onclick="backToList()" class="p-2 hover:bg-stone-100 rounded-lg"><span class="material-symbols-outlined">arrow_back</span></button>
                <div id="sender-info" class="flex items-center gap-3">
                    <div id="sender-avatar" class="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-xs font-bold"></div>
                    <span id="sender-name" class="font-medium text-sm"></span>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="p-2 hover:bg-stone-100 rounded-lg"><span class="material-symbols-outlined">archive</span></button>
                <button class="p-2 hover:bg-stone-100 rounded-lg"><span class="material-symbols-outlined">delete</span></button>
                <button class="p-2 hover:bg-stone-100 rounded-lg"><span class="material-symbols-outlined">more_vert</span></button>
            </div>
        </header>

        <!-- Content -->
        <article id="reader-content" class="flex-1 overflow-y-auto p-12 max-w-2xl mx-auto view-transition">
            <h1 id="mail-subject" class="text-4xl font-semibold mb-8"></h1>
            <div id="mail-body" class="text-stone-700 leading-relaxed text-lg"></div>
        </article>
    </main>

    <script>
        const emails = [
            { id: 1, sender: "Hart Leggett", initial: "H", date: "Jan 11", subject: "Yard swing?", body: "<p>Hey Bryan,</p><p>Welcome home! I hope the move went smoothly.</p><p>Is there a good spot for a tree swing?</p>" },
            { id: 2, sender: "Ben Thompson", initial: "B", date: "Nov 17", subject: "Playing on Hard Mode", body: "<p>One way to understand how the Internet is different is to examine what business models work.</p>" },
            { id: 3, sender: "Dieter Bohn", initial: "D", date: "Nov 25", subject: "Samsung's rumored Galaxy S21 lineup", body: "<p>The hardware review cycle is settling down.</p>" }
        ];

        let currentIndex = 0;

        function renderList() {
            const list = document.getElementById('inbox-list');
            list.innerHTML = emails.map((e, i) => `
                <div onclick="openMail(${i})" class="p-6 cursor-pointer hover:bg-stone-50 flex items-center gap-4 ${i === currentIndex ? 'bg-stone-100' : ''}">
                    <div class="w-10 h-10 rounded-full bg-stone-200 flex items-center justify-center font-bold text-sm">${e.initial}</div>
                    <div class="flex-1">
                        <div class="font-medium text-sm">${e.sender}</div>
                        <div class="text-xs text-stone-500 truncate">${e.subject}</div>
                    </div>
                </div>
            `).join('');
        }

        function openMail(index) {
            currentIndex = index;
            const email = emails[index];
            const content = document.getElementById('reader-content');
            
            content.classList.add('view-transition');
            
            setTimeout(() => {
                document.getElementById('sender-avatar').innerText = email.initial;
                document.getElementById('sender-name').innerText = email.sender;
                document.getElementById('mail-subject').innerText = email.subject;
                document.getElementById('mail-body').innerHTML = email.body;
                content.classList.remove('view-transition');
                renderList();
            }, 200);
        }

        function backToList() {
            // Mobile-first approach: hide reader, show list
            document.getElementById('reader-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' && currentIndex < emails.length - 1) openMail(currentIndex + 1);
            if (e.key === 'ArrowUp' && currentIndex > 0) openMail(currentIndex - 1);
        });

        // Initialize
        renderList();
        openMail(0);
    </script>
</body>
</html>
