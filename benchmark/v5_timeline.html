<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 05 - The Vertical Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .timeline-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.1); }
        .email-node { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; filter: grayscale(1); opacity: 0.4; }
        .email-node:hover, .email-node.active { filter: grayscale(0); opacity: 1; transform: scale(1.05); }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="timeline-line"></div>
    
    <div class="flex flex-col gap-24 relative z-10 w-full max-w-4xl px-12 overflow-y-auto h-full no-scrollbar py-40">
        <!-- Morning -->
        <div class="email-node flex items-center gap-12 active">
            <div class="w-1/2 text-right">
                <span class="text-xs tracking-widest opacity-50">09:12 AM</span>
                <h2 class="text-2xl font-semibold mt-2">Stripe Payout</h2>
            </div>
            <div class="w-4 h-4 rounded-full bg-blue-500 shadow-[0_0_20px_rgba(59,130,246,0.5)]"></div>
            <div class="w-1/2 glass p-6 rounded-3xl">
                <p class="text-sm opacity-60 italic serif">"The funds are on their way to your bank..."</p>
            </div>
        </div>

        <!-- Noon -->
        <div class="email-node flex flex-row-reverse items-center gap-12">
            <div class="w-1/2 text-left">
                <span class="text-xs tracking-widest opacity-50">12:45 PM</span>
                <h2 class="text-2xl font-semibold mt-2">Apple Vision Pro</h2>
            </div>
            <div class="w-4 h-4 rounded-full bg-purple-500"></div>
            <div class="w-1/2 glass p-6 rounded-3xl">
                <p class="text-sm opacity-60 italic serif">"Your pre-order is confirmed for pickup..."</p>
            </div>
        </div>

        <!-- Evening -->
        <div class="email-node flex items-center gap-12">
            <div class="w-1/2 text-right">
                <span class="text-xs tracking-widest opacity-50">06:20 PM</span>
                <h2 class="text-2xl font-semibold mt-2">Vercel Deployment</h2>
            </div>
            <div class="w-4 h-4 rounded-full bg-emerald-500"></div>
            <div class="w-1/2 glass p-6 rounded-3xl">
                <p class="text-sm opacity-60 italic serif">"Production build completed in 42s..."</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-12 left-12">
        <span class="text-[100px] font-black opacity-5 italic serif leading-none">JUNE 18</span>
    </div>
</body>
</html>
