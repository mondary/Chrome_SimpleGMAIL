<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 06 - Bento Grid Flux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f0f0; color: #1a1a1a; font-family: sans-serif; padding: 40px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 150px); gap: 20px; }
        .bento-card { background: white; border-radius: 32px; padding: 30px; transition: all 0.4s ease; cursor: pointer; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .bento-card:hover { transform: scale(0.98); background: #fafafa; }
        .bento-card.large { grid-column: span 2; grid-row: span 2; }
        .bento-card.tall { grid-row: span 2; }
        .tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    </style>
</head>
<body>
    <div class="bento-grid max-w-6xl mx-auto">
        <div class="bento-card large shadow-sm flex flex-col justify-between">
            <div>
                <span class="tag">Primary</span>
                <h2 class="text-4xl font-bold mt-4 tracking-tighter">Your Morning Digest</h2>
            </div>
            <p class="text-sm text-gray-400">12 new updates from Stripe, GitHub, and Linear.</p>
        </div>
        
        <div class="bento-card tall shadow-sm border-l-4 border-blue-500">
            <span class="tag">Stripe</span>
            <h3 class="text-xl font-bold mt-2">Payout Success</h3>
            <p class="text-xs text-gray-500 mt-4 leading-relaxed">Your transfer of $14,200 is now being processed by your bank.</p>
        </div>

        <div class="bento-card shadow-sm bg-black text-white">
            <span class="tag opacity-50">Drafts</span>
            <h3 class="text-lg font-bold mt-1 italic">Project Alpha...</h3>
        </div>

        <div class="bento-card shadow-sm">
            <span class="tag">Social</span>
            <h3 class="text-lg font-bold mt-1">LinkedIn</h3>
        </div>

        <div class="bento-card large shadow-sm flex gap-6">
            <div class="w-1/2 border-r border-gray-100 pr-6">
                <span class="tag text-red-500">Urgent</span>
                <h3 class="text-xl font-bold mt-2 leading-tight">Security Alert: GitHub</h3>
                <p class="text-xs text-gray-400 mt-4">Unauthorized access detected in repository...</p>
            </div>
            <div class="w-1/2 flex items-center justify-center">
                <div class="w-20 h-20 rounded-full bg-gray-50 flex items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
            </div>
        </div>

        <div class="bento-card shadow-sm">
             <span class="tag">Archive</span>
        </div>
    </div>
</body>
</html>
