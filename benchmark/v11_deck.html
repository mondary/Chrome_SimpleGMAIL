<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 11 - The Card Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .deck { position: relative; width: 400px; height: 600px; }
        .card { position: absolute; inset: 0; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform-origin: bottom center; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:nth-child(1) { transform: translateY(0) rotate(0); z-index: 3; }
        .card:nth-child(2) { transform: translateY(-20px) scale(0.95); z-index: 2; opacity: 0.6; }
        .card:nth-child(3) { transform: translateY(-40px) scale(0.9); z-index: 1; opacity: 0.3; }
        .card:hover { transform: translateY(-100px) rotate(-5deg) !important; }
    </style>
</head>
<body>
    <div class="deck">
        <div class="card">
            <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center font-bold text-xl mb-8">S</div>
            <h2 class="text-3xl font-bold leading-tight">Monthly Payout Processed</h2>
            <p class="text-gray-500 mt-6 leading-relaxed">Your transfer of $14,250 is scheduled to arrive in 48 hours.</p>
            <div class="mt-12 text-xs uppercase tracking-widest font-bold opacity-30">Swipe to Archive</div>
        </div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</body>
</html>
