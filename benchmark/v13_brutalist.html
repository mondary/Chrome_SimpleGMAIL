<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 13 - Neo-Brutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #FF90E8; color: #000; padding: 40px; font-family: 'Comic Sans MS', cursive; } /* Brutalist choice */
        .box { background: #fff; border: 4px solid #000; box-shadow: 10px 10px 0 #000; padding: 30px; margin-bottom: 30px; transition: all 0.2s; cursor: pointer; }
        .box:hover { transform: translate(-4px, -4px); box-shadow: 14px 14px 0 #000; }
        .box:active { transform: translate(4px, 4px); box-shadow: 6px 6px 0 #000; }
        .tag { background: #B1FFFF; border: 2px solid #000; padding: 4px 10px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="grid grid-cols-3 gap-8">
        <div class="box bg-[#7BFFD1]">
            <span class="tag">System</span>
            <h2 class="text-2xl font-black italic">M-GMAIL</h2>
            <p class="mt-4 font-bold">Functional. Raw. Bold.</p>
        </div>
        <div class="col-span-2 box">
            <span class="tag">Search</span>
            <input type="text" class="w-full bg-transparent outline-none font-bold text-xl" placeholder="TYPE HERE TO FIND STUFF...">
        </div>
        
        <div class="box">
            <span class="tag">09:12</span>
            <h3 class="text-xl font-black">STRIPE</h3>
            <p class="mt-2 font-bold">PAYOUT OK!</p>
        </div>
        <div class="box">
            <span class="tag">12:45</span>
            <h3 class="text-xl font-black">OPENAI</h3>
            <p class="mt-2 font-bold">GPT-5 IS HERE!</p>
        </div>
        <div class="box">
            <span class="tag">18:20</span>
            <h3 class="text-xl font-black">GITHUB</h3>
            <p class="mt-2 font-bold">HACKED? CHECK NOW!</p>
        </div>
    </div>
</body>
</html>
