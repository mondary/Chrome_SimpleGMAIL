<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenMail V4 - Large Volume Focus</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        display: ['Instrument Serif', 'serif'],
                    },
                    colors: {
                        zen: {
                            bg: '#F5F2EB', // Plaster cream
                            darkbg: '#0A0A0B', // Wabi-sabi obsidian
                            card: '#FFFFFF',
                            darkcard: '#121316',
                            border: '#E2DEC8',
                            darkborder: '#1F2127',
                            text: '#161719',
                            darktext: '#E5E6EA',
                            muted: '#6E727A',
                            darkmuted: '#80858F',
                            accent: '#967456', 
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/css">
        /* Scrollbar-free view but keep scrolling behavior */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Immersive photo background with leaf shadow */
        .wabi-sabi-bg {
            background-image: linear-gradient(to right, rgba(245, 242, 235, 0.94), rgba(245, 242, 235, 0.98)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .dark .wabi-sabi-bg {
            background-image: linear-gradient(to right, rgba(10, 10, 11, 0.96), rgba(10, 10, 11, 0.98)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Smooth slide item transition */
        .slide-item {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            position: absolute;
            inset: 0;
        }
        .slide-item.active {
            transform: translateX(0);
            opacity: 1;
            z-index: 20;
        }
        .slide-item.next {
            transform: translateX(100%);
            opacity: 0;
            z-index: 10;
        }
        .slide-item.prev {
            transform: translateX(-100%);
            opacity: 0;
            z-index: 10;
        }

        /* Active keyboard list navigator */
        .list-row.active-row {
            background-color: rgba(150, 116, 86, 0.08);
            border-left: 3px solid #967456;
        }
        
        .dark .list-row.active-row {
            background-color: rgba(150, 116, 86, 0.12);
            border-left: 3px solid #967456;
        }

        /* Ambient grain layer */
        .grain-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="wabi-sabi-bg text-zen-text dark:text-zen-darktext h-dvh overflow-hidden select-none font-sans transition-colors duration-500">

    <!-- Subtle noise texture -->
    <div class="grain-overlay"></div>

    <!-- MAIN GRID CONTAINER -->
    <div class="h-full w-full flex flex-col justify-between py-6 px-6 sm:px-12 md:px-16 relative z-10">
        
        <!-- HEADER -->
        <header class="flex items-center justify-between z-30 shrink-0 pb-4 border-b border-zen-border/10 dark:border-zen-darkborder/10">
            <div class="flex items-center gap-3">
                <span class="font-display font-medium text-3xl italic">ZenMail <span class="font-sans text-[10px] uppercase tracking-widest font-bold text-zen-accent ml-2">v4</span></span>
            </div>
            
            <div class="flex items-center gap-6">
                <span id="list-count" class="text-xs uppercase tracking-widest font-semibold text-zen-muted dark:text-zen-darkmuted">0 messages</span>
                <button id="view-mode-btn" class="text-xs uppercase tracking-widest font-bold text-zen-muted dark:text-zen-darkmuted hover:text-zen-text dark:hover:text-zen-darktext transition-colors">
                    Archives
                </button>
                <button id="sync-gmail-btn" class="text-xs uppercase tracking-widest font-bold text-emerald-600 dark:text-emerald-400 hover:opacity-85">
                    Sync Gmail
                </button>
                <button id="theme-toggle" class="p-1 hover:opacity-75 transition-opacity" aria-label="Toggle Theme">
                    <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
                </button>
            </div>
        </header>

        <!-- TWO COLUMN WORKSPACE FOR HIGH VOLUME -->
        <div class="flex-1 flex gap-8 my-6 min-h-0 relative">
            
            <!-- LEFT NAVIGATION TIMELINE (QUICK JUMP BY DATE BUCKET) -->
            <aside class="hidden lg:flex flex-col gap-5 justify-center text-[10px] uppercase tracking-widest font-bold text-zen-muted dark:text-zen-darkmuted shrink-0 w-20">
                <button data-bucket="today" class="bucket-btn text-left hover:text-zen-text dark:hover:text-zen-darktext transition-colors text-zen-accent">Aujourd'hui</button>
                <button data-bucket="yesterday" class="bucket-btn text-left hover:text-zen-text dark:hover:text-zen-darktext transition-colors">Hier</button>
                <button data-bucket="this-week" class="bucket-btn text-left hover:text-zen-text dark:hover:text-zen-darktext transition-colors">Cette semaine</button>
                <button data-bucket="older" class="bucket-btn text-left hover:text-zen-text dark:hover:text-zen-darktext transition-colors">Plus anciens</button>
            </aside>

            <!-- MAIN LIST VIEW PANEL -->
            <section id="list-panel" class="flex-1 flex flex-col min-w-0 h-full justify-between transition-all duration-300">
                <!-- Search and Filters row -->
                <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center justify-between mb-6">
                    <div class="flex-1 max-w-xl">
                        <input type="text" id="search-input" placeholder="Rechercher (Appuyez sur /)" class="w-full bg-transparent border-b border-zen-border dark:border-zen-darkborder focus:border-zen-text dark:focus:border-zen-darktext py-2 text-sm outline-none placeholder-zen-muted dark:placeholder-zen-darkmuted transition-colors">
                    </div>
                    <!-- Quick Toggle Filters -->
                    <div class="flex gap-3 text-[10px] uppercase tracking-widest font-bold">
                        <button id="filter-unread-btn" class="px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all">Non lus</button>
                        <button id="filter-starred-btn" class="px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all">Suivis</button>
                    </div>
                </div>

                <!-- High Volume Scroll Container -->
                <div id="email-rows-container" class="flex-1 overflow-y-auto no-scrollbar divide-y divide-zen-border/10 dark:divide-zen-darkborder/10">
                    <!-- Dynamic email items populated here -->
                </div>

                <!-- Footer Pagination Status -->
                <div class="pt-4 mt-2 border-t border-zen-border/10 dark:border-zen-darkborder/10 flex items-center justify-between text-xs text-zen-muted dark:text-zen-darkmuted">
                    <div class="flex items-center gap-2">
                        <span>Navigation: <kbd class="px-1.5 py-0.5 rounded bg-zen-border/30 dark:bg-zen-darkborder/50 text-[10px] font-bold">J</kbd> / <kbd class="px-1.5 py-0.5 rounded bg-zen-border/30 dark:bg-zen-darkborder/50 text-[10px] font-bold">K</kbd></span>
                        <span>•</span>
                        <span>Archiver: <kbd class="px-1.5 py-0.5 rounded bg-zen-border/30 dark:bg-zen-darkborder/50 text-[10px] font-bold">E</kbd></span>
                    </div>
                    <button id="load-more-btn" class="text-[10px] uppercase tracking-widest font-bold text-zen-accent hover:opacity-85 transition-opacity">Afficher plus d'e-mails</button>
                </div>
            </section>

            <!-- DETAILED PREVIEW SLIDER PANE (Overlay) -->
            <section id="slider-panel" class="hidden absolute inset-0 z-20 bg-zen-bg/95 dark:bg-zen-darkbg/95 flex flex-col justify-between py-4 min-h-0">
                <!-- Close Slider controls -->
                <div class="flex items-center justify-between border-b border-zen-border/30 dark:border-zen-darkborder/30 pb-4 shrink-0">
                    <button id="slider-close-btn" class="group flex items-center gap-2 text-xs uppercase tracking-widest font-bold text-zen-muted dark:text-zen-darkmuted hover:text-zen-text dark:hover:text-zen-darktext transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4 transition-transform group-hover:-translate-x-0.5"></i>
                        <span>Retour</span>
                    </button>
                    
                    <div class="flex items-center gap-4">
                        <button id="slider-star-btn" class="p-2 text-zen-muted dark:text-zen-darkmuted hover:text-amber-500 transition-colors">
                            <i data-lucide="star" class="w-4 h-4"></i>
                        </button>
                        <button id="slider-archive-btn" class="p-2 text-zen-muted dark:text-zen-darkmuted hover:text-rose-500 transition-colors">
                            <i data-lucide="archive" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Slide Frame -->
                <div class="flex-1 my-6 relative overflow-hidden min-h-0">
                    <div id="slides-viewport" class="w-full h-full relative">
                        <!-- Transiting slides injected here -->
                    </div>
                </div>

                <!-- Reply bar & progress indicators -->
                <div class="border-t border-zen-border/30 dark:border-zen-darkborder/30 pt-4 shrink-0 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="flex items-center gap-4 text-xs font-semibold text-zen-muted dark:text-zen-darkmuted uppercase tracking-widest">
                        <span id="slider-progress-index">01 / 00</span>
                        <div class="w-24 h-0.5 bg-zen-border dark:bg-zen-darkborder rounded-full overflow-hidden">
                            <div id="slider-progress-bar" class="h-full bg-zen-text dark:bg-zen-darktext transition-all duration-300 w-0"></div>
                        </div>
                    </div>

                    <!-- Quick response box -->
                    <div class="flex-1 max-w-lg relative flex items-center bg-white dark:bg-zen-darkcard border border-zen-border dark:border-zen-darkborder rounded-xl p-1.5">
                        <input type="text" id="slider-reply-input" placeholder="Répondre rapidement..." class="flex-1 bg-transparent border-0 ring-0 focus:ring-0 px-3 py-1 text-xs outline-none text-zen-text dark:text-zen-darktext">
                        <button id="slider-reply-send-btn" class="p-2 bg-zen-text text-zen-bg dark:bg-zen-darktext dark:text-zen-darkbg rounded-lg transition-transform hover:scale-105 active:scale-95 shrink-0">
                            <i data-lucide="send-horizontal" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
            </section>
        </div>
        
        <!-- FLOATING WRITER -->
        <div id="compose-panel" class="hidden fixed bottom-6 right-6 w-96 max-w-full rounded-2xl bg-white dark:bg-zen-darkcard border border-zen-border dark:border-zen-darkborder shadow-xl flex flex-col overflow-hidden z-40 transition-all duration-300 transform scale-95 opacity-0 pointer-events-none">
            <div class="px-5 py-4 border-b border-zen-border/30 dark:border-zen-darkborder/30 flex items-center justify-between bg-slate-50/20 dark:bg-slate-900/10">
                <span class="text-xs uppercase tracking-widest font-bold">Nouveau Message</span>
                <button id="close-compose-btn" class="p-1 hover:opacity-75 transition-opacity">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-4 flex flex-col gap-2 bg-transparent">
                <input type="text" id="compose-to" placeholder="À : destinataire@company.com" class="w-full bg-transparent border-b border-zen-border dark:border-zen-darkborder focus:border-zen-accent p-2 text-xs outline-none">
                <input type="text" id="compose-subject" placeholder="Objet" class="w-full bg-transparent border-b border-zen-border dark:border-zen-darkborder focus:border-zen-accent p-2 text-xs outline-none">
                <textarea id="compose-body" placeholder="Rédiger votre message..." class="w-full h-40 bg-transparent p-2 text-xs outline-none resize-none leading-relaxed"></textarea>
            </div>
            <div class="p-3 border-t border-zen-border/40 dark:border-zen-darkborder/40 flex justify-end bg-transparent">
                <button id="send-btn" class="px-4 py-2 bg-zen-text text-zen-bg dark:bg-zen-darktext dark:text-zen-darkbg rounded-xl text-xs uppercase tracking-widest font-semibold hover:scale-102 transition-transform">
                    Envoyer
                </button>
            </div>
        </div>

        <!-- Notification container -->
        <div id="toast-container" class="fixed bottom-6 left-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    </div>

    <!-- Script loading -->
    <script>
        // --- HIGH VOLUME MOCK GENERATOR (100+ EMAILS) ---
        
        let mockEmails = [];
        
        // Let's generate a rich array of 100 emails to test performance and navigation
        const senders = [
            "Stripe Payouts <payouts@stripe.com>",
            "OpenAI Launchpad <news@openai.com>",
            "GitHub Security <security@github.com>",
            "Vercel <deployments@vercel.com>",
            "Figma Teams <updates@figma.com>",
            "Linear Support <support@linear.app>",
            "Apple Billing <billing@apple.com>",
            "Airbnb Bookings <reservations@airbnb.com>",
            "Notion Digest <digest@notion.so>",
            "Medium Articles <noreply@medium.com>"
        ];
        
        const subjects = [
            "Versement Stripe traité - $14,250.00",
            "Présentation de GPT-5 : Intelligence Générale",
            "Alerte de sécurité critique webpack-dev-server",
            "Déploiement production réussi 'aeromail-app'",
            "Sarah Connor a commenté votre mockup V2",
            "Nouveau ticket assigné : [AER-201]",
            "Votre facture iCloud+ 200 Go",
            "Votre réservation The Nordic Cabin est validée",
            "Votre récapitulatif de lecture hebdomadaire",
            "Nouveautés sur l'écriture de code avec IA"
        ];

        const snippets = [
            "Votre virement Stripe est en cours d'acheminement.",
            "Nous lançons aujourd'hui les clés d'accès à GPT-5.",
            "Dependabot a trouvé une faille critique de type RCE.",
            "Le build a pris 42 secondes sur la branche main.",
            "J'adore la sobriété de ce rendu, beau boulot !",
            "Tâche assignée : optimiser le scrolling à haut volume.",
            "Le paiement mensuel de 2.99 € a été validé.",
            "Voici les détails de votre enregistrement à 15h.",
            "Découvrez les 5 articles les plus lus cette semaine.",
            "Comment concevoir des designs wabi-sabi minimalistes."
        ];

        const bodies = [
            "<p>Votre virement a été traité. Les fonds arriveront d'ici 1 à 2 jours ouvrables sur votre compte.</p>",
            "<p>Nous sommes ravis d'annoncer GPT-5. Le modèle multi-modal le plus performant du monde.</p>",
            "<p>Une vulnérabilité critique a été détectée. Veuillez mettre à jour webpack-dev-server.</p>",
            "<p>Déploiement en production réussi. Les logs de build sont disponibles en ligne.</p>",
            "<p>Sarah Connor : 'Le design est superbe. Faisons simple.'</p>",
            "<p>Optimisez le rendu CSS pour prendre en charge 10 000 éléments simultanément.</p>",
            "<p>Votre reçu de paiement mensuel pour iCloud+ 200 Go est disponible en pièce jointe.</p>",
            "<p>Réservation validée pour 3 nuits à The Nordic Cabin. Adresse : 12 rue des Pins.</p>",
            "<p>Voici votre sélection d'articles sur le minimalisme et la productivité.</p>",
            "<p>Lisez nos conseils pour concevoir des applications web durables et épurées.</p>"
        ];

        // Generate mock data spanning today, yesterday, this week, and older
        function generateMockDatabase() {
            const now = new Date();
            for (let i = 0; i < 100; i++) {
                const idx = i % 10;
                
                // Distribute dates
                let emailDate = new Date(now);
                if (i < 8) {
                    // Today (spread by hours)
                    emailDate.setHours(now.getHours() - i);
                } else if (i < 20) {
                    // Yesterday
                    emailDate.setDate(now.getDate() - 1);
                    emailDate.setHours(12 - (i % 5));
                } else if (i < 50) {
                    // This week
                    emailDate.setDate(now.getDate() - (2 + (i % 5)));
                } else {
                    // Older (spread over previous month)
                    emailDate.setDate(now.getDate() - (7 + (i % 25)));
                }

                mockEmails.push({
                    id: `msg-mock-${i}`,
                    folder: "INBOX",
                    labelIds: i % 4 === 0 ? ["INBOX", "UNREAD"] : ["INBOX"],
                    tags: i % 5 === 0 ? ["Urgent"] : (i % 6 === 0 ? ["Travail"] : []),
                    from: senders[idx],
                    subject: `${subjects[idx]} #${100 - i}`,
                    snippet: snippets[idx],
                    date: emailDate.toISOString(),
                    body: bodies[idx],
                    starred: i % 7 === 0
                });
            }
        }

        // --- GLOBAL APP STATE ---
        let activeRowIndex = 0; // Highlight row index in list for key navigation
        let activeEmailIndex = -1; // Active slide inside the reader slider
        let filteredEmails = [];
        let viewMode = "INBOX"; // INBOX / ARCHIVE
        let isDarkMode = true;
        let activeFilter = ""; // "unread" or "starred"
        let activeBucket = ""; // timeline quick anchors

        // --- GMAIL LIVE SYNC OAUTH ---
        let gmailConnected = false;
        let gmailAuthToken = null;
        const GMAIL_API_BASE = 'https://gmail.googleapis.com/gmail/v1/users/me';
        const isChromeExtension = typeof chrome !== 'undefined' && chrome.identity && chrome.identity.getAuthToken;

        function updateSyncBadge() {
            const btn = document.getElementById('sync-gmail-btn');
            if (isChromeExtension) {
                if (gmailConnected) {
                    btn.textContent = "Gmail Connecté";
                    btn.className = "text-xs uppercase tracking-widest font-bold text-emerald-600 dark:text-emerald-400";
                } else {
                    btn.textContent = "Connecter Gmail";
                    btn.className = "text-xs uppercase tracking-widest font-bold text-amber-500 hover:opacity-85";
                }
            } else {
                btn.textContent = "Mode Démo";
                btn.className = "text-xs uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 pointer-events-none";
            }
        }

        async function getGmailToken(interactive = true) {
            if (gmailAuthToken) return gmailAuthToken;
            return new Promise((resolve, reject) => {
                chrome.identity.getAuthToken({ interactive }, (token) => {
                    if (chrome.runtime.lastError) {
                        reject(new Error(chrome.runtime.lastError.message));
                    } else {
                        gmailAuthToken = token;
                        gmailConnected = true;
                        resolve(token);
                    }
                });
            });
        }

        async function makeGmailRequest(endpoint, options = {}) {
            const token = await getGmailToken(true);
            const url = endpoint.startsWith('http') ? endpoint : `${GMAIL_API_BASE}${endpoint}`;
            const response = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                }
            });
            if (!response.ok) {
                if (response.status === 401) {
                    gmailAuthToken = null;
                    gmailConnected = false;
                    chrome.identity.removeCachedAuthToken({ token }, () => {});
                }
                throw new Error(`API error ${response.status}`);
            }
            return response.json();
        }

        async function connectGmail() {
            if (!isChromeExtension) return;
            showToast("Demande d'autorisation Gmail...", "info");
            try {
                await getGmailToken(true);
                gmailConnected = true;
                showToast("Gmail synchronisé !", "success");
                updateSyncBadge();
                await syncGmailEmails();
            } catch (err) {
                showToast(`Authentification échouée : ${err.message}`, "error");
            }
        }

        async function syncGmailEmails() {
            if (!gmailConnected) return;
            showToast("Récupération de vos e-mails...", "info");
            
            try {
                // Fetch first 30 messages
                const data = await makeGmailRequest('/messages?maxResults=30');
                if (!data.messages || data.messages.length === 0) {
                    mockEmails = [];
                    renderList();
                    return;
                }

                const detailedPromises = data.messages.map(m => makeGmailRequest(`/messages/${m.id}`));
                const detailedEmails = await Promise.all(detailedPromises);

                mockEmails = detailedEmails.map(item => {
                    const headers = item.payload.headers || [];
                    const from = headers.find(h => h.name === 'From')?.value || 'Inconnu';
                    const subject = headers.find(h => h.name === 'Subject')?.value || '(Sans objet)';
                    const dateVal = headers.find(h => h.name === 'Date')?.value || new Date().toISOString();
                    const snippet = item.snippet || '';
                    
                    let parsedBody = "<p>Aucun contenu lisible.</p>";
                    if (item.payload.body && item.payload.body.data) {
                        parsedBody = decodeBase64(item.payload.body.data);
                    } else if (item.payload.parts) {
                        const htmlPart = item.payload.parts.find(p => p.mimeType === 'text/html');
                        if (htmlPart && htmlPart.body && htmlPart.body.data) {
                            parsedBody = decodeBase64(htmlPart.body.data);
                        } else if (item.payload.parts[0] && item.payload.parts[0].body && item.payload.parts[0].body.data) {
                            parsedBody = decodeBase64(item.payload.parts[0].body.data);
                        }
                    }

                    const labels = item.labelIds || [];
                    const folder = labels.includes('TRASH') ? 'TRASH' : (labels.includes('SENT') ? 'SENT' : (labels.includes('DRAFT') ? 'DRAFTS' : 'INBOX'));

                    return {
                        id: item.id,
                        folder: folder,
                        labelIds: labels,
                        tags: labels.includes('UNREAD') ? ['Mises à jour'] : [],
                        from: from,
                        subject: subject,
                        snippet: snippet,
                        date: new Date(dateVal).toISOString(),
                        body: parsedBody,
                        starred: labels.includes('STARRED')
                    };
                });

                renderList();
                showToast("Boîte de réception actualisée !", "success");
            } catch (err) {
                console.error(err);
                showToast("Erreur de récupération Gmail.", "error");
            }
        }

        function decodeBase64(data) {
            try {
                const base64 = data.replace(/-/g, '+').replace(/_/g, '/');
                return decodeURIComponent(escape(atob(base64)));
            } catch (e) { return "<p>[Erreur de décodage]</p>"; }
        }

        async function toggleGmailLabel(id, labelName, add) {
            if (!gmailConnected) return;
            try {
                const addLabels = add ? [labelName] : [];
                const removeLabels = add ? [] : [labelName];
                await makeGmailRequest(`/messages/${id}/modify`, {
                    method: 'POST',
                    body: JSON.stringify({ addLabelIds: addLabels, removeLabelIds: removeLabels })
                });
            } catch (err) { console.error(err); }
        }

        async function removeGmailLabel(id, labelName) {
            return toggleGmailLabel(id, labelName, false);
        }

        async function addGmailLabel(id, labelName) {
            return toggleGmailLabel(id, labelName, true);
        }

        // --- HIGH VOLUME FILTERING & BUCKETS ---

        function renderList() {
            const container = document.getElementById('email-rows-container');
            container.innerHTML = '';

            const searchVal = document.getElementById('search-input').value.trim().toLowerCase();

            // Filter chain
            filteredEmails = mockEmails.filter(email => {
                // Folder filter
                if (viewMode === "INBOX" && email.folder !== "INBOX") return false;
                if (viewMode === "ARCHIVE" && email.folder !== "ARCHIVE") return false;

                // Read/starred filter
                if (activeFilter === "unread" && !email.labelIds.includes("UNREAD")) return false;
                if (activeFilter === "starred" && !email.starred) return false;

                // Search query
                if (searchVal) {
                    const matchFrom = email.from.toLowerCase().includes(searchVal);
                    const matchSub = email.subject.toLowerCase().includes(searchVal);
                    const matchSnip = email.snippet.toLowerCase().includes(searchVal);
                    if (!matchFrom && !matchSub && !matchSnip) return false;
                }

                // Date Bucket Timeline jump filter
                if (activeBucket) {
                    const diffDays = getDiffDays(email.date);
                    if (activeBucket === "today" && diffDays !== 0) return false;
                    if (activeBucket === "yesterday" && diffDays !== 1) return false;
                    if (activeBucket === "this-week" && (diffDays < 2 || diffDays > 7)) return false;
                    if (activeBucket === "older" && diffDays <= 7) return false;
                }

                return true;
            });

            // Sort newest first
            filteredEmails.sort((a,b) => new Date(b.date) - new Date(a.date));

            // Set visual counts
            document.getElementById('list-count').textContent = `${filteredEmails.length} messages`;

            if (filteredEmails.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center font-serif text-xl text-zen-muted dark:text-zen-darkmuted">
                        Aucun message
                    </div>
                `;
                return;
            }

            // Render list items with bucket labels
            let lastBucketLabel = "";

            filteredEmails.forEach((email, index) => {
                const diffDays = getDiffDays(email.date);
                let currentBucketLabel = "";

                if (diffDays === 0) currentBucketLabel = "Aujourd'hui";
                else if (diffDays === 1) currentBucketLabel = "Hier";
                else if (diffDays <= 7) currentBucketLabel = "Cette semaine";
                else currentBucketLabel = "Plus anciens";

                // Add separator row for date buckets to handle large lists
                if (currentBucketLabel !== lastBucketLabel && !searchVal && !activeBucket) {
                    const sep = document.createElement('div');
                    sep.className = "py-4 text-[10px] uppercase tracking-widest font-bold text-zen-accent border-b border-zen-border/10 dark:border-zen-darkborder/10 select-none";
                    sep.textContent = currentBucketLabel;
                    container.appendChild(sep);
                    lastBucketLabel = currentBucketLabel;
                }

                const row = document.createElement('div');
                const senderName = email.from.split('<')[0].trim().replace(/"/g, '') || email.from;
                const isUnread = email.labelIds.includes('UNREAD');
                const timeStr = new Date(email.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                const dateStr = new Date(email.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
                const timeOrDate = diffDays === 0 ? timeStr : dateStr;

                row.className = `list-row py-4 px-4 flex items-center justify-between cursor-pointer border-b border-zen-border/10 dark:border-zen-darkborder/10 transition-all duration-150 ${index === activeRowIndex ? 'list-row active-row' : 'hover:bg-slate-200/20 dark:hover:bg-slate-800/10'}`;
                row.setAttribute('data-id', email.id);
                row.setAttribute('data-index', index);
                
                row.innerHTML = `
                    <div class="flex items-center gap-6 min-w-0 pr-6">
                        <div class="w-2 shrink-0 flex items-center justify-center">
                            ${email.starred ? `<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>` : ''}
                            ${isUnread && !email.starred ? `<span class="w-1.5 h-1.5 rounded-full bg-brand-500"></span>` : ''}
                        </div>
                        <div class="min-w-0">
                            <span class="text-[10px] uppercase tracking-widest font-bold truncate block ${isUnread ? 'text-zen-accent' : 'text-zen-muted dark:text-zen-darkmuted'}">${senderName}</span>
                            <h3 class="font-serif text-base font-normal truncate mt-0.5 ${isUnread ? 'font-medium' : ''}">
                                ${email.subject}
                            </h3>
                        </div>
                    </div>
                    <span class="text-xs text-zen-muted dark:text-zen-darkmuted tracking-widest shrink-0 font-medium">${timeOrDate}</span>
                `;

                row.onclick = () => {
                    activeRowIndex = index;
                    openSlider(index);
                };

                container.appendChild(row);
            });

            // Auto scroll container slightly if navigator row goes offscreen
            updateListScroll();
            lucide.createIcons();
        }

        function getDiffDays(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        // Scroll active rows into focus automatically
        function updateListScroll() {
            const container = document.getElementById('email-rows-container');
            const activeRow = container.querySelector('.active-row');
            if (activeRow) {
                const rect = activeRow.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                if (rect.bottom > containerRect.bottom) {
                    container.scrollTop += rect.bottom - containerRect.bottom;
                } else if (rect.top < containerRect.top) {
                    container.scrollTop -= containerRect.top - rect.top;
                }
            }
        }

        // --- DETAILED IMMERSIVE READER SLIDER ---

        const sliderPanel = document.getElementById('slider-panel');
        const viewport = document.getElementById('slides-viewport');

        function openSlider(index) {
            activeEmailIndex = index;
            sliderPanel.classList.remove('hidden');
            
            renderSlides();
            updateSliderProgress();

            // Mark unread off
            const email = filteredEmails[activeEmailIndex];
            if (email.labelIds.includes('UNREAD')) {
                email.labelIds = email.labelIds.filter(l => l !== 'UNREAD');
                if (isChromeExtension && gmailConnected) {
                    removeGmailLabel(email.id, 'UNREAD');
                }
            }
        }

        function closeSlider() {
            sliderPanel.classList.add('hidden');
            activeEmailIndex = -1;
            renderList();
        }

        document.getElementById('slider-close-btn').onclick = closeSlider;

        function renderSlides() {
            viewport.innerHTML = '';

            filteredEmails.forEach((email, index) => {
                const slide = document.createElement('div');
                slide.className = "slide-item select-text flex justify-center py-4";
                
                if (index === activeEmailIndex) {
                    slide.classList.add('active');
                } else if (index < activeEmailIndex) {
                    slide.classList.add('prev');
                } else {
                    slide.classList.add('next');
                }

                const senderName = email.from.split('<')[0].trim().replace(/"/g, '') || email.from;
                const formattedDate = new Date(email.date).toLocaleDateString('fr-FR', {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                slide.innerHTML = `
                    <div class="w-full max-w-2xl flex flex-col justify-between overflow-y-auto no-scrollbar">
                        <div class="space-y-6 pr-1">
                            <div class="space-y-3">
                                <h1 class="font-serif text-3xl sm:text-4xl font-normal leading-tight tracking-tight text-zen-text dark:text-zen-darktext">
                                    ${email.subject}
                                </h1>
                                <div class="flex items-baseline justify-between text-xs text-zen-muted dark:text-zen-darkmuted border-b border-zen-border/20 dark:border-zen-darkborder/20 pb-4">
                                    <div class="flex flex-col gap-0.5">
                                        <span class="font-semibold text-zen-text dark:text-zen-darktext text-sm">${senderName}</span>
                                        <span>${email.from}</span>
                                    </div>
                                    <span>${formattedDate}</span>
                                </div>
                            </div>

                            <article class="email-body-content prose dark:prose-invert max-w-none text-zen-text/90 dark:text-zen-darktext/90 font-serif text-lg leading-relaxed select-text">
                                ${email.body}
                            </article>
                        </div>
                    </div>
                `;

                viewport.appendChild(slide);
            });

            // Update Star Toolbar
            const email = filteredEmails[activeEmailIndex];
            const starIcon = document.querySelector('#slider-star-btn i');
            if (email.starred) {
                starIcon.className = "w-4 h-4 fill-amber-500 text-amber-500";
            } else {
                starIcon.className = "w-4 h-4 text-zen-muted dark:text-zen-darkmuted";
            }
            lucide.createIcons();
        }

        function updateSliderProgress() {
            if (activeEmailIndex === -1 || filteredEmails.length === 0) return;
            
            const progress = ((activeEmailIndex + 1) / filteredEmails.length) * 100;
            document.getElementById('slider-progress-bar').style.width = `${progress}%`;
            
            const txt = `${String(activeEmailIndex + 1).padStart(2, '0')} / ${String(filteredEmails.length).padStart(2, '0')}`;
            document.getElementById('slider-progress-index').textContent = txt;
        }

        function slideNext() {
            if (activeEmailIndex < filteredEmails.length - 1) {
                const slides = viewport.querySelectorAll('.slide-item');
                slides[activeEmailIndex].className = "slide-item prev";
                activeEmailIndex++;
                slides[activeEmailIndex].className = "slide-item active";

                updateSliderProgress();
                renderSlides();
                
                // Read marker
                const email = filteredEmails[activeEmailIndex];
                if (email.labelIds.includes('UNREAD')) {
                    email.labelIds = email.labelIds.filter(l => l !== 'UNREAD');
                    if (isChromeExtension && gmailConnected) {
                        removeGmailLabel(email.id, 'UNREAD');
                    }
                }
            } else {
                showToast("Fin de la liste", "info");
            }
        }

        function slidePrev() {
            if (activeEmailIndex > 0) {
                const slides = viewport.querySelectorAll('.slide-item');
                slides[activeEmailIndex].className = "slide-item next";
                activeEmailIndex--;
                slides[activeEmailIndex].className = "slide-item active";

                updateSliderProgress();
                renderSlides();
            }
        }

        // --- COMPOSER POPUP ---

        const composePanel = document.getElementById('compose-panel');

        function openCompose() {
            composePanel.classList.remove('hidden');
            setTimeout(() => {
                composePanel.style.transform = "scale(1)";
                composePanel.style.opacity = "1";
                composePanel.style.pointerEvents = "auto";
            }, 10);
            document.getElementById('compose-to').focus();
        }

        function closeCompose() {
            composePanel.style.transform = "scale(0.95)";
            composePanel.style.opacity = "0";
            composePanel.style.pointerEvents = "none";
            setTimeout(() => {
                composePanel.classList.add('hidden');
                document.getElementById('compose-to').value = '';
                document.getElementById('compose-subject').value = '';
                document.getElementById('compose-body').value = '';
            }, 300);
        }

        document.getElementById('close-compose-btn').onclick = closeCompose;

        document.getElementById('send-btn').onclick = async () => {
            const to = document.getElementById('compose-to').value.trim();
            const subject = document.getElementById('compose-subject').value.trim() || "(Sans objet)";
            const body = document.getElementById('compose-body').value;

            if (!to) {
                showToast("Veuillez saisir un destinataire", "error");
                return;
            }

            showToast("Envoi...", "info");

            if (isChromeExtension && gmailConnected) {
                try {
                    const raw = makeGmailMime(to, subject, body);
                    await makeGmailRequest('/messages/send', { method: 'POST', body: JSON.stringify({ raw }) });
                    showToast("Message envoyé !", "success");
                } catch (err) {
                    showToast(`Échec d'envoi Gmail : ${err.message}`, "error");
                }
            } else {
                const newMail = {
                    id: `msg-mock-sent-${Date.now()}`,
                    folder: "SENT",
                    labelIds: ["SENT"],
                    tags: [],
                    from: "Sarah Connor <sarah@aero.co>",
                    subject: subject,
                    snippet: body.substring(0, 100),
                    date: new Date().toISOString(),
                    body: body.replace(/\n/g, '<br>'),
                    starred: false
                };
                mockEmails.push(newMail);
                showToast("Message envoyé !", "success");
            }
            closeCompose();
            renderList();
        };

        function makeGmailMime(to, subject, message) {
            const str = [
                "Content-Type: text/html; charset=\"UTF-8\"\r\n",
                "MIME-Version: 1.0\r\n",
                "Content-Transfer-Encoding: 7bit\r\n",
                "to: ", to, "\r\n",
                "subject: ", subject, "\r\n\r\n",
                message
            ].join('');
            return btoa(unescape(encodeURIComponent(str)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        // Quick Reply send from slider
        document.getElementById('slider-reply-send-btn').onclick = async () => {
            const input = document.getElementById('slider-reply-input');
            const txt = input.value.trim();
            if (!txt || activeEmailIndex === -1) return;

            const email = filteredEmails[activeEmailIndex];
            showToast("Envoi de la réponse...", "info");

            if (isChromeExtension && gmailConnected) {
                try {
                    const raw = makeGmailMime(email.from, `Re: ${email.subject}`, txt);
                    await makeGmailRequest('/messages/send', { method: 'POST', body: JSON.stringify({ raw }) });
                    showToast("Réponse envoyée !", "success");
                } catch (err) {
                    showToast(`Échec : ${err.message}`, "error");
                }
            } else {
                const repMail = {
                    id: `msg-rep-${Date.now()}`,
                    folder: "SENT",
                    labelIds: ["SENT"],
                    tags: [],
                    from: "Sarah Connor <sarah@aero.co>",
                    subject: `Re: ${email.subject}`,
                    snippet: txt,
                    date: new Date().toISOString(),
                    body: txt,
                    starred: false
                };
                mockEmails.push(repMail);
                showToast("Réponse envoyée !", "success");
            }
            input.value = '';
            
            if (activeEmailIndex < filteredEmails.length - 1) {
                slideNext();
            } else {
                closeSlider();
            }
        };

        // --- TOOLBAR SLIDER ACTIONS ---

        document.getElementById('slider-star-btn').onclick = () => {
            if (activeEmailIndex !== -1) {
                const email = filteredEmails[activeEmailIndex];
                email.starred = !email.starred;
                if (isChromeExtension && gmailConnected) {
                    toggleGmailLabel(email.id, 'STARRED', email.starred);
                }
                showToast(email.starred ? "Message suivi" : "Message non suivi", "info");
                renderSlides();
            }
        };

        document.getElementById('slider-archive-btn').onclick = () => {
            if (activeEmailIndex !== -1) {
                const email = filteredEmails[activeEmailIndex];
                email.folder = "ARCHIVE";
                if (isChromeExtension && gmailConnected) {
                    removeGmailLabel(email.id, 'INBOX');
                }
                showToast("Message archivé", "info");

                if (filteredEmails.length > 1) {
                    filteredEmails.splice(activeEmailIndex, 1);
                    if (activeEmailIndex >= filteredEmails.length) {
                        activeEmailIndex = filteredEmails.length - 1;
                    }
                    openSlider(activeEmailIndex);
                } else {
                    closeSlider();
                }
            }
        };

        // --- GLOBAL SETTINGS EVENTS ---

        // Theme Toggle
        document.getElementById('theme-toggle').onclick = () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                showToast("Thème sombre", "info");
            } else {
                document.documentElement.classList.remove('dark');
                showToast("Thème clair", "info");
            }
        };

        // Inbox vs Archive mode
        document.getElementById('view-mode-btn').onclick = () => {
            const btn = document.getElementById('view-mode-btn');
            if (viewMode === "INBOX") {
                viewMode = "ARCHIVE";
                btn.textContent = "Boîte de réception";
                showToast("Affichage des Archives", "info");
            } else {
                viewMode = "INBOX";
                btn.textContent = "Archives";
                showToast("Boîte de réception", "info");
            }
            activeRowIndex = 0;
            renderList();
        };

        // Sync button click
        document.getElementById('sync-gmail-btn').onclick = async () => {
            if (gmailConnected) {
                await syncGmailEmails();
            } else {
                await connectGmail();
            }
        };

        // Dynamic filters (unread/starred)
        document.getElementById('filter-unread-btn').onclick = (e) => {
            const btn = document.getElementById('filter-unread-btn');
            if (activeFilter === "unread") {
                activeFilter = "";
                btn.className = "px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all";
            } else {
                activeFilter = "unread";
                btn.className = "px-3 py-1.5 rounded-full border border-zen-accent bg-zen-accent/5 text-zen-accent";
                // De-activate starred
                document.getElementById('filter-starred-btn').className = "px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all";
            }
            activeRowIndex = 0;
            renderList();
        };

        document.getElementById('filter-starred-btn').onclick = (e) => {
            const btn = document.getElementById('filter-starred-btn');
            if (activeFilter === "starred") {
                activeFilter = "";
                btn.className = "px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all";
            } else {
                activeFilter = "starred";
                btn.className = "px-3 py-1.5 rounded-full border border-zen-accent bg-zen-accent/5 text-zen-accent";
                // De-activate unread
                document.getElementById('filter-unread-btn').className = "px-3 py-1.5 rounded-full border border-zen-border/60 dark:border-zen-darkborder/60 text-zen-muted dark:text-zen-darkmuted hover:text-zen-text hover:border-zen-text dark:hover:text-zen-darktext dark:hover:border-zen-darktext transition-all";
            }
            activeRowIndex = 0;
            renderList();
        };

        // Timeline quick anchors
        document.querySelectorAll('.bucket-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.bucket-btn').forEach(b => {
                    b.className = "bucket-btn text-left hover:text-zen-text dark:hover:text-zen-darktext transition-colors";
                });
                
                const val = btn.getAttribute('data-bucket');
                if (activeBucket === val) {
                    activeBucket = "";
                } else {
                    activeBucket = val;
                    btn.className = "bucket-btn text-left text-zen-accent font-bold transition-colors";
                }
                activeRowIndex = 0;
                renderList();
            };
        });

        // Search trigger
        const searchInput = document.getElementById('search-input');
        searchInput.oninput = () => {
            activeRowIndex = 0;
            renderList();
        };

        // Show more emails load
        document.getElementById('load-more-btn').onclick = () => {
            showToast("Chargement de messages plus anciens...", "info");
            setTimeout(() => {
                showToast("100 e-mails de démonstration chargés.", "success");
            }, 500);
        };

        // --- KEYBOARD SHORTCUT NAVIGATOR ---

        document.addEventListener('keydown', (e) => {
            const tag = e.target.tagName.toLowerCase();
            if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) {
                if (e.key === 'Enter' && e.target.id === 'slider-reply-input') {
                    document.getElementById('slider-reply-send-btn').click();
                }
                return;
            }

            if (e.key === '/') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            } else if (e.key.toLowerCase() === 'c') {
                e.preventDefault();
                openCompose();
            } else if (e.key === 'Escape') {
                closeSlider();
                closeCompose();
            }

            // Keyboard navigation for LIST MODE
            if (activeEmailIndex === -1) {
                if (e.key === 'ArrowDown' || e.key.toLowerCase() === 'j') {
                    e.preventDefault();
                    if (activeRowIndex < filteredEmails.length - 1) {
                        activeRowIndex++;
                        renderList();
                    }
                } else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'k') {
                    e.preventDefault();
                    if (activeRowIndex > 0) {
                        activeRowIndex--;
                        renderList();
                    }
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (filteredEmails[activeRowIndex]) {
                        openSlider(activeRowIndex);
                    }
                } else if (e.key.toLowerCase() === 'e') {
                    e.preventDefault();
                    // Archive immediately from list
                    const email = filteredEmails[activeRowIndex];
                    if (email) {
                        email.folder = "ARCHIVE";
                        if (isChromeExtension && gmailConnected) {
                            removeGmailLabel(email.id, 'INBOX');
                        }
                        showToast("Message archivé", "info");
                        renderList();
                    }
                } else if (e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    // Star row
                    const email = filteredEmails[activeRowIndex];
                    if (email) {
                        email.starred = !email.starred;
                        if (isChromeExtension && gmailConnected) {
                            toggleGmailLabel(email.id, 'STARRED', email.starred);
                        }
                        renderList();
                    }
                }
            } 
            // Keyboard navigation for SLIDER MODE
            else {
                if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    slideNext();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    slidePrev();
                } else if (e.key.toLowerCase() === 'e' || e.key.toLowerCase() === 'a') {
                    e.preventDefault();
                    document.getElementById('slider-archive-btn').click();
                } else if (e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    document.getElementById('slider-star-btn').click();
                } else if (e.key.toLowerCase() === 'r') {
                    e.preventDefault();
                    document.getElementById('slider-reply-input').focus();
                }
            }
        });

        // --- TOAST NOTIFICATIONS ---
        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = "bg-zen-text text-zen-bg dark:bg-zen-darktext dark:text-zen-darkbg";
            let icon = "info";
            
            if (type === "success") {
                bgClass = "bg-emerald-600 text-white shadow-emerald-500/10";
                icon = "check-circle";
            } else if (type === "error") {
                bgClass = "bg-rose-600 text-white shadow-rose-500/10";
                icon = "alert-circle";
            }

            toast.className = `p-4 rounded-xl shadow-xl flex items-center gap-3 text-xs font-semibold border border-white/5 transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto ${bgClass}`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-4 h-4"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            generateMockDatabase();
            renderList();
            updateSyncState();
            
            document.documentElement.className = "dark";
            
            if (isChromeExtension) {
                getGmailToken(false).then(() => {
                    updateSyncState();
                    syncGmailEmails();
                }).catch(() => {});
            }
        });
    </script>
</body>
</html>
