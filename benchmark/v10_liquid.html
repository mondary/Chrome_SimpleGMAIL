<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 10 - Abstract Liquid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #fff; color: #000; overflow: hidden; height: 100vh; }
        .blob { position: absolute; width: 600px; height: 600px; background: linear-gradient(45deg, #FF3E00, #FFBE00); border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }
        .mail-stack { position: relative; z-index: 10; padding: 80px; }
        .mail-row { display: flex; align-items: center; justify-content: space-between; padding: 30px 0; border-bottom: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: all 0.4s; }
        .mail-row:hover { color: #FF3E00; transform: skewX(-5deg); }
        .sender { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .subject { font-size: 50px; font-weight: 200; letter-spacing: -2px; }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="mail-stack">
        <div class="mail-row">
            <span class="sender">Stripe</span>
            <h2 class="subject">The money is moving.</h2>
            <span class="opacity-30">09:12</span>
        </div>
        <div class="mail-row">
            <span class="sender">OpenAI</span>
            <h2 class="subject">Reasoning at scale.</h2>
            <span class="opacity-30">12:45</span>
        </div>
        <div class="mail-row">
            <span class="sender">GitHub</span>
            <h2 class="subject">Code at risk.</h2>
            <span class="opacity-30">18:20</span>
        </div>
    </div>
</body>
</html>
