<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monolith Mail - v21 Premium Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
      overflow: hidden;
    }
    .material-symbols-outlined {
      font-size: 24px;
      user-select: none;
    }
    .nav-arrow {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .nav-arrow:hover {
      background: white;
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    .nav-arrow:active {
      transform: translateY(-50%) scale(0.95);
    }
    
    /* Animation Container */
    #content-container {
      perspective: 1000px;
    }

    .email-view {
      will-change: transform, opacity;
      background: white;
    }

    .email-card {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <!-- Header -->
  <header class="h-16 flex items-center justify-between px-6 bg-white border-b shrink-0 z-30">
    <div class="flex items-center gap-4">
      <button onclick="showInbox()" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
        <span class="material-symbols-outlined text-gray-600">arrow_back</span>
      </button>
      <h1 id="header-title" class="text-lg font-semibold text-gray-800">Lecteur d'e-mails</h1>
    </div>
    
    <div class="flex items-center gap-2">
       <div id="email-info" class="hidden md:flex items-center gap-2 text-sm text-gray-500 mr-4">
         <span id="current-index-display">1 / 10</span>
       </div>
       <button class="p-2 hover:bg-gray-100 rounded-full"><span class="material-symbols-outlined text-gray-600">archive</span></button>
       <button class="p-2 hover:bg-gray-100 rounded-full"><span class="material-symbols-outlined text-gray-600">delete</span></button>
       <button class="p-2 hover:bg-gray-100 rounded-full"><span class="material-symbols-outlined text-gray-600">more_vert</span></button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 relative flex items-center justify-center p-4 md:p-8 overflow-hidden">
    
    <!-- Inbox List View (Hidden by default) -->
    <div id="inbox-view" class="hidden w-full max-w-4xl overflow-y-auto bg-white rounded-2xl shadow-lg z-10">
        <div class="p-6 border-b"><h2 class="font-bold text-xl">Votre boîte de réception</h2></div>
        <div id="inbox-list" class="divide-y"></div>
    </div>

    <!-- Reader View -->
    <div id="reader-view" class="w-full max-w-4xl h-full flex items-center justify-center relative">
      
      <!-- Navigation Arrows (Interface) -->
      <button onclick="navigateMail(-1)" class="nav-arrow absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full flex items-center justify-center z-20 text-gray-700" title="Précédent (←)">
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      
      <button onclick="navigateMail(1)" class="nav-arrow absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full flex items-center justify-center z-20 text-gray-700" title="Suivant (→)">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>

      <!-- Email Content Container -->
      <div id="content-container" class="w-full h-full overflow-hidden relative">
        <!-- Views will be injected here dynamically -->
      </div>

    </div>
  </main>

  <script>
    let emails = [];
    let currentIndex = 0;
    let isReaderMode = true;

    function makeMailBody(sender, initial, bgColor, date, subject, bodyText) {
      return `
        <div class="flex flex-col">
          <div class="flex items-start justify-between mb-10">
            <div class="flex items-start gap-5">
              <div class="w-14 h-14 rounded-2xl ${bgColor} flex items-center justify-center font-bold text-white text-xl shadow-lg shrink-0">${initial}</div>
              <div>
                <div class="flex items-baseline gap-3">
                  <span class="font-bold text-xl text-[#1a1c1e]">${sender}</span>
                  <span class="text-sm text-[#6b7280] font-medium">${date}</span>
                </div>
                <div class="text-sm text-[#9ca3af] mt-1">à moi</div>
              </div>
            </div>
          </div>
          <div class="text-lg text-[#374151] leading-relaxed space-y-6">
            <h2 class="text-3xl font-extrabold text-[#111827] tracking-tight">${subject}</h2>
            <div class="prose prose-lg max-w-none text-[#4b5563]">${bodyText}</div>
          </div>
        </div>
      `;
    }

    const initialMockEmails = [
      { id: 1, sender: "Hart Leggett", initial: "H", color: "bg-indigo-500", date: "Jan 11, 2021", subject: "Yard swing?", body: "<p>Hey Bryan,</p><p>Welcome home! I think you already closed on the house over the weekend. Hope it went smoothly.</p><p>I'm about to order the gifts and wanted to triple check on one: a big swing meant to hang from a tree. Is there a good spot?</p><p>Thanks,<br>Hart</p>" },
      { id: 2, sender: "Ben Thompson", initial: "S", color: "bg-orange-500", date: "Nov 17, 2020", subject: "Playing on Hard Mode", body: "<p>One way to understand how the Internet is different is to examine what business models work. Start with text and images, long the province of newspapers…</p><p>Thanks for reading,<br>Ben</p>" },
      { id: 3, sender: "Dieter Bohn", initial: "P", color: "bg-gray-700", date: "Nov 25, 2020", subject: "Samsung's rumored Galaxy S21 lineup", body: "<p>The hardware review cycle is settling down. Let's talk about CES and the rumors of early Samsung announcements…</p><p>Dieter</p>" },
      { id: 4, sender: "Jam Club", initial: "J", color: "bg-teal-600", date: "Nov 22, 2020", subject: "You only have 30 days to join the Jam Club", body: "<p>Registration for the upcoming creative prototyping workshops closes in exactly 30 days. Don't miss out!</p><p>Jam Club</p>" },
      { id: 5, sender: "Monzo HQ", initial: "M", color: "bg-blue-700", date: "Nov 20, 2020", subject: "Introducing our new metal card", body: "<p>Introducing Monzo Premium. Our new account tier comes with a heavy metal card made from precision-machined stainless steel…</p><p>Monzo</p>" },
      { id: 6, sender: "Sarah Chen", initial: "S", color: "bg-purple-500", date: "Jan 10, 2021", subject: "Q4 Report finalized", body: "<p>Hi,</p><p>The Q4 report is attached. Could you review the revenue projections section before our meeting on Thursday?</p><p>Thanks,<br>Sarah</p>" },
      { id: 7, sender: "Mike Rodriguez", initial: "M", color: "bg-pink-500", date: "Jan 9, 2021", subject: "Updated mockups", body: "<p>Hey! I've updated the dashboard mockups based on last week's feedback. The new charts section should address the data density concerns.</p><p>Mike</p>" },
      { id: 8, sender: "LinkedIn", initial: "L", color: "bg-blue-600", date: "Jan 8, 2021", subject: "3 new connection requests", body: "<p>You have 3 new connection requests from people in your network.</p>" },
      { id: 9, sender: "GitHub", initial: "G", color: "bg-gray-800", date: "Jan 7, 2021", subject: "[monolith-mail] PR #142 merged", body: "<p>Pull request #142 'Fix pagination bug in message list' has been merged into main by @developer.</p>" },
      { id: 10, sender: "Ben Thompson", initial: "S", color: "bg-orange-500", date: "Nov 24, 2020", subject: "The Tech IPO Season", body: "<p>We are witnessing one of the busiest IPO windows for enterprise SaaS and technology platforms in history.</p><p>Best,<br>Ben</p>" }
    ];

    function init() {
      emails = initialMockEmails.map(e => ({
        ...e,
        html: makeMailBody(e.sender, e.initial, e.color, e.date, e.subject, e.body)
      }));
      renderCurrentView();
      setupKeyboard();
    }

    function renderCurrentView() {
      const container = document.getElementById('content-container');
      // Clean up if container is empty
      if (container.innerHTML === '') {
        const firstView = document.createElement('div');
        firstView.className = 'email-view email-card w-full h-full rounded-2xl p-6 md:p-12 overflow-y-auto absolute inset-0';
        container.appendChild(firstView);
      }
      
      const view = container.querySelector('.email-view');
      const email = emails[currentIndex];
      view.innerHTML = email.html;
      document.getElementById('current-index-display').innerText = `${currentIndex + 1} / ${emails.length}`;
    }

    function navigateMail(direction) {
      const container = document.getElementById('content-container');
      const oldView = container.querySelector('.email-view');
      const newIndex = currentIndex + direction;

      if (newIndex < 0 || newIndex >= emails.length) return;

      currentIndex = newIndex;
      const email = emails[currentIndex];

      // 1. Create the new view element
      const newView = document.createElement('div');
      newView.className = 'email-view email-card w-full h-full rounded-2xl p-6 md:p-12 overflow-y-auto absolute inset-0';
      newView.innerHTML = email.html;

      // 2. Set initial position for new view based on direction
      const startX = direction === 1 ? 100 : -100;
      newView.style.transform = `translateX(${startX}%)`;
      newView.style.opacity = '0';

      container.appendChild(newView);

      // Force reflow to ensure the browser registers the initial position
      newView.offsetWidth;

      // 3. Define animation parameters
      const duration = 500;
      const ease = 'cubic-bezier(0.4, 0, 0.2, 1)';

      // 4. Execute animations
      // Exit animation for old view (Slide out + Scale down)
      const exitX = direction === 1 ? -100 : 100;
      oldView.style.transition = `transform ${duration}ms ${ease}, opacity ${duration}ms ease`;
      oldView.style.transform = `translateX(${exitX}%) scale(0.92)`;
      oldView.style.opacity = '0';

      // Entry animation for new view (Slide in + Scale up)
      newView.style.transition = `transform ${duration}ms ${ease}, opacity ${duration}ms ease`;
      newView.style.transform = 'translateX(0) scale(1)';
      newView.style.opacity = '1';

      // 5. Cleanup after animation completes
      setTimeout(() => {
        container.removeChild(oldView);
        // To keep it clean, we make the current view the "base" if needed, 
        // but in this implementation, we just let the newView exist as the new 'oldView' for next time.
      }, duration);
    }

    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (!isReaderMode) return;
        if (e.key === 'ArrowLeft') navigateMail(-1);
        if (e.key === 'ArrowRight') navigateMail(1);
      });
    }

    function showInbox() {
      isReaderMode = false;
      document.getElementById('reader-view').classList.add('hidden');
      document.getElementById('inbox-view').classList.remove('hidden');
      document.getElementById('email-info').classList.add('hidden');
      document.getElementById('header-title').innerText = "Boîte de réception";
      renderInbox();
    }

    function renderInbox() {
      const list = document.getElementById('inbox-list');
      list.innerHTML = '';
      emails.forEach((email, idx) => {
        const item = document.createElement('div');
        item.className = 'p-4 hover:bg-gray-50 cursor-pointer flex items-center gap-4 transition-colors';
        item.innerHTML = `
          <div class="w-10 h-10 rounded-full ${email.color} flex items-center justify-center text-white font-bold shrink-0">${email.initial}</div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between">
              <span class="font-semibold text-gray-900">${email.sender}</span>
              <span class="text-xs text-gray-500">${email.date}</span>
            </div>
            <div class="text-sm text-gray-600 truncate">${email.subject}</div>
          </div>
        `;
        item.onclick = () => {
          currentIndex = idx;
          enterReaderMode();
        };
        list.appendChild(item);
      });
    }

    function enterReaderMode() {
      isReaderMode = true;
      document.getElementById('reader-view').classList.remove('hidden');
      document.getElementById('inbox-view').classList.add('hidden');
      document.getElementById('email-info').classList.remove('hidden');
      document.getElementById('header-title').innerText = "Lecteur d'e-mails";
      
      // Re-init container if it was empty or destroyed
      const container = document.getElementById('content-container');
      if (container.innerHTML === '') {
          renderCurrentView();
      } else {
          // If we are returning to reader mode from inbox, 
          // we need to make sure the current view reflects the selected email.
          const view = container.querySelector('.email-view');
          if (view) {
            const email = emails[currentIndex];
            view.innerHTML = email.html;
            view.style.transform = 'translateX(0) scale(1)';
            view.style.opacity = '1';
          }
      }
      document.getElementById('current-index-display').innerText = `${currentIndex + 1} / ${emails.length}`;
    }

    init();
  </script>
</body>
</html>
