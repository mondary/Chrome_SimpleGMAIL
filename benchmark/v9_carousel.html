<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark 09 - The 3D Carousel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        .carousel { width: 400px; height: 550px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { position: absolute; inset: 0; background: #222; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); padding: 40px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 50px 100px rgba(0,0,0,0.5); backface-visibility: hidden; }
        .card:nth-child(1) { transform: translateZ(100px); }
        .card:nth-child(2) { transform: rotateY(120deg) translateZ(100px); opacity: 0.5; }
        .card:nth-child(3) { transform: rotateY(240deg) translateZ(100px); opacity: 0.5; }
        .btn-nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .nav-dot { width: 12px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; }
        .nav-dot.active { background: #fff; }
    </style>
</head>
<body>
    <div class="carousel">
        <div class="card">
            <div>
                <span class="text-xs uppercase tracking-widest text-blue-500 font-bold">Financial</span>
                <h2 class="text-4xl font-bold mt-4 leading-tight">Stripe Payout</h2>
            </div>
            <p class="opacity-50 text-sm leading-relaxed">Your monthly earnings of $14,250 are on their way. Typical delivery in 2 business days.</p>
            <button class="w-full py-4 border border-white/10 rounded-2xl hover:bg-white hover:text-black transition-all">Read Story</button>
        </div>
    </div>

    <div class="btn-nav">
        <div class="nav-dot active"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
    </div>
</body>
</html>
