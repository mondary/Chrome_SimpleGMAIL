<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benchmark 16 - Client Mail Épuré</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0b0b0c;
      --bg-secondary: #121214;
      --bg-tertiary: #1a1a1e;
      --border-color: rgba(255, 255, 255, 0.06);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent: #ffffff;
      --accent-dim: rgba(255, 255, 255, 0.08);
      --accent-hover: rgba(255, 255, 255, 0.15);
      --accent-blue: #3b82f6;
      --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
    }

    /* Light Theme variables - toggleable */
    html.light {
      --bg-primary: #fcfcfc;
      --bg-secondary: #f4f4f6;
      --bg-tertiary: #ebebed;
      --border-color: rgba(0, 0, 0, 0.06);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --accent: #000000;
      --accent-dim: rgba(0, 0, 0, 0.05);
      --accent-hover: rgba(0, 0, 0, 0.1);
      --accent-blue: #2563eb;
      --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .border-custom {
      border-color: var(--border-color);
    }
    .bg-custom-sec {
      background-color: var(--bg-secondary);
    }
    .bg-custom-tert {
      background-color: var(--bg-tertiary);
    }
    .text-custom-sec {
      color: var(--text-secondary);
    }
    .text-custom-muted {
      color: var(--text-muted);
    }

    /* Active state styling */
    .folder-active {
      background-color: var(--accent-dim);
      color: var(--text-primary);
      font-weight: 500;
    }

    .msg-active {
      background-color: var(--bg-tertiary);
      border-left: 2px solid var(--accent);
    }

    /* Glassmorphism for Modal */
    .glass-modal {
      background: rgba(18, 18, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    html.light .glass-modal {
      background: rgba(244, 244, 246, 0.8);
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col antialiased">

  <!-- Main Shell -->
  <div class="flex flex-1 overflow-hidden h-full">
    
    <!-- Left Sidebar (Collapsible on mobile) -->
    <aside class="w-64 bg-custom-sec border-r border-custom flex flex-col justify-between shrink-0 hidden md:flex transition-all duration-300">
      <div class="p-6 flex flex-col gap-6">
        <!-- Brand & Theme Switcher -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full bg-current"></div>
            <span class="font-semibold tracking-tight text-sm">MONOLITH</span>
          </div>
          <!-- Simple Light/Dark Toggle -->
          <button onclick="toggleTheme()" class="text-custom-sec hover:text-custom-primary transition-colors focus:outline-none" aria-label="Toggle Theme">
            <svg id="theme-icon-dark" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <svg id="theme-icon-light" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          </button>
        </div>

        <!-- Compose Action -->
        <button onclick="toggleCompose(true)" class="w-full flex items-center justify-between px-4 py-2.5 rounded-lg border border-custom hover:bg-[var(--accent-dim)] transition-all duration-150 group">
          <span class="text-xs font-medium tracking-wide uppercase text-custom-sec group-hover:text-[var(--text-primary)]">Rédiger</span>
          <svg class="w-4 h-4 text-custom-sec group-hover:text-[var(--text-primary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>

        <!-- Navigation Section -->
        <div class="flex flex-col gap-1.5">
          <span class="text-[10px] font-bold tracking-widest text-custom-muted uppercase px-3 mb-1">Dossiers</span>
          <button onclick="switchFolder('inbox')" id="folder-inbox" class="folder-active flex items-center justify-between px-3 py-2 rounded-md text-xs transition-colors">
            <span class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0l-8 5-8-5"/></svg>
              Boîte de réception
            </span>
            <span id="badge-inbox" class="px-1.5 py-0.5 rounded bg-custom-tert text-[10px] font-mono text-custom-sec">3</span>
          </button>
          <button onclick="switchFolder('starred')" id="folder-starred" class="flex items-center justify-between px-3 py-2 rounded-md text-xs text-custom-sec hover:bg-[var(--accent-dim)] transition-colors">
            <span class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.371 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.178 0l-3.97 2.883c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 10.1c-.783-.57-.38-1.81.588-1.81h4.907a1 1 0 00.95-.69l1.519-4.674z"/></svg>
              Messages suivis
            </span>
            <span id="badge-starred" class="px-1.5 py-0.5 rounded bg-custom-tert text-[10px] font-mono text-custom-sec">1</span>
          </button>
          <button onclick="switchFolder('sent')" id="folder-sent" class="flex items-center justify-between px-3 py-2 rounded-md text-xs text-custom-sec hover:bg-[var(--accent-dim)] transition-colors">
            <span class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              Envoyés
            </span>
          </button>
          <button onclick="switchFolder('drafts')" id="folder-drafts" class="flex items-center justify-between px-3 py-2 rounded-md text-xs text-custom-sec hover:bg-[var(--accent-dim)] transition-colors">
            <span class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              Brouillons
            </span>
          </button>
          <button onclick="switchFolder('archive')" id="folder-archive" class="flex items-center justify-between px-3 py-2 rounded-md text-xs text-custom-sec hover:bg-[var(--accent-dim)] transition-colors">
            <span class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
              Archives
            </span>
          </button>
        </div>
      </div>

      <!-- User Profile & Context Info -->
      <div class="p-6 border-t border-custom flex flex-col gap-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-custom-tert border border-custom flex items-center justify-center font-semibold text-xs tracking-wider">
            CL
          </div>
          <div class="flex flex-col min-w-0">
            <span class="text-xs font-semibold truncate">clm@monolith.dev</span>
            <span class="text-[10px] text-custom-muted truncate">Utilisateur actif</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Center List Pane (Search and message items) -->
    <section class="w-full md:w-[380px] lg:w-[420px] bg-custom-primary border-r border-custom flex flex-col shrink-0">
      
      <!-- Search area -->
      <div class="p-5 border-b border-custom flex flex-col gap-3">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-3.5 w-3.5 text-custom-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </span>
          <input oninput="filterEmails(this.value)" type="text" placeholder="Rechercher un message..." class="w-full pl-9 pr-4 py-2 text-xs bg-custom-sec border border-custom rounded-lg focus:outline-none focus:border-current placeholder-custom-muted transition-colors">
        </div>
        <div class="flex items-center justify-between text-[11px] text-custom-sec">
          <span id="active-folder-label" class="font-medium uppercase tracking-wider text-custom-muted">Boîte de réception</span>
          <span id="message-count">3 messages</span>
        </div>
      </div>

      <!-- Messages Scrollable List -->
      <div id="email-list" class="flex-1 overflow-y-auto divide-y divide-custom">
        <!-- Rendered via JS -->
      </div>
    </section>

    <!-- Right Reader Pane -->
    <main id="reader-pane" class="flex-1 bg-custom-sec flex flex-col overflow-hidden">
      <!-- Top Action bar -->
      <div class="h-16 px-6 border-b border-custom flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="toggleStar()" class="text-custom-sec hover:text-[var(--accent)] transition-colors focus:outline-none" title="Suivre">
            <svg id="star-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.961 0 1.371 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.178 0l-3.97 2.883c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 10.1c-.783-.57-.38-1.81.588-1.81h4.907a1 1 0 00.95-.69l1.519-4.674z"/></svg>
          </button>
          <button onclick="archiveEmail()" class="text-custom-sec hover:text-[var(--accent)] transition-colors focus:outline-none" title="Archiver">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
          </button>
          <button onclick="toggleUnread()" class="text-custom-sec hover:text-[var(--accent)] transition-colors focus:outline-none" title="Marquer comme non lu">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-2.25-1.5a2 2 0 00-2.25 0l-2.25 1.5"/></svg>
          </button>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="replyToEmail()" class="px-3.5 py-1.5 rounded bg-[var(--text-primary)] text-[var(--bg-primary)] font-medium text-xs hover:opacity-90 transition-opacity flex items-center gap-1.5">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
            Répondre
          </button>
        </div>
      </div>

      <!-- Main Reader Content -->
      <div id="reader-content" class="flex-1 overflow-y-auto p-8 lg:p-12 flex flex-col gap-6">
        <!-- Rendered dynamically -->
      </div>
    </main>

  </div>

  <!-- Compose Modal (Overlay layout) -->
  <div id="compose-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 hidden transition-opacity duration-300 opacity-0">
    <div class="w-full max-w-2xl bg-custom-sec border border-custom rounded-2xl shadow-2xl glass-modal overflow-hidden flex flex-col transform scale-95 transition-transform duration-300">
      
      <!-- Modal Header -->
      <div class="px-6 py-4 border-b border-custom flex items-center justify-between">
        <span class="text-xs font-semibold tracking-wider uppercase text-custom-sec">Nouveau Message</span>
        <button onclick="toggleCompose(false)" class="text-custom-sec hover:text-[var(--accent)] transition-colors focus:outline-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Modal Body -->
      <form id="compose-form" onsubmit="sendForm(event)" class="p-6 flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-bold uppercase tracking-wider text-custom-muted">Destinataire</label>
          <input required type="email" id="compose-to" placeholder="destinataire@domain.com" class="w-full px-3 py-2 text-xs bg-custom-primary border border-custom rounded-lg focus:outline-none focus:border-current transition-colors">
        </div>
        
        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-bold uppercase tracking-wider text-custom-muted">Sujet</label>
          <input required type="text" id="compose-subject" placeholder="Sujet du message..." class="w-full px-3 py-2 text-xs bg-custom-primary border border-custom rounded-lg focus:outline-none focus:border-current transition-colors">
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-[10px] font-bold uppercase tracking-wider text-custom-muted">Message</label>
          <textarea required id="compose-body" rows="8" placeholder="Écrivez votre message ici..." class="w-full px-3 py-2.5 text-xs bg-custom-primary border border-custom rounded-lg focus:outline-none focus:border-current resize-none transition-colors"></textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3 mt-2">
          <button type="button" onclick="toggleCompose(false)" class="px-4 py-2 rounded-lg text-xs font-medium text-custom-sec hover:bg-custom-tert transition-colors">Annuler</button>
          <button type="submit" class="px-5 py-2 rounded-lg bg-[var(--text-primary)] text-[var(--bg-primary)] text-xs font-semibold hover:opacity-90 transition-opacity">Envoyer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="fixed bottom-6 right-6 px-4 py-3 bg-[var(--text-primary)] text-[var(--bg-primary)] text-xs font-medium rounded-lg shadow-xl translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
    Notification text
  </div>

  <!-- Application Logic -->
  <script>
    // State management
    let currentFolder = 'inbox';
    let currentSelectedId = 1;
    let searchQuery = '';

    // Seed Data
    let emails = [
      {
        id: 1,
        sender: "Linear Team",
        email: "noreply@linear.app",
        subject: "Mises à jour du cycle et nouvelles fonctionnalités",
        snippet: "Nous avons apporté plusieurs améliorations majeures à la gestion des cycles, incluant l'auto-attribution des tâches et de nouveaux graphiques de performance.",
        body: `<p>Bonjour,</p>
               <p>Nous sommes ravis de vous présenter les nouveautés de ce cycle. Notre équipe a travaillé d'arrache-pied pour améliorer la fluidité et la vitesse de votre espace de travail.</p>
               <p><strong>Principaux changements :</strong></p>
               <ul class="list-disc pl-5 my-2 flex flex-col gap-1">
                 <li><strong>Visualisation améliorée :</strong> Vos graphiques de vélocité sont désormais mis à jour en temps réel.</li>
                 <li><strong>Automatisation :</strong> Les tickets non résolus peuvent être migrés automatiquement vers le cycle suivant.</li>
                 <li><strong>Raccourcis :</strong> Utilisez la touche <kbd class="px-1 bg-custom-tert rounded font-mono">G</kbd> puis <kbd class="px-1 bg-custom-tert rounded font-mono">C</kbd> pour changer rapidement de cycle.</li>
               </ul>
               <p>N'hésitez pas à nous envoyer vos retours en répondant directement à cet e-mail.</p>
               <p>L'équipe Linear.</p>`,
        date: "09:42",
        unread: true,
        starred: false,
        folder: "inbox"
      },
      {
        id: 2,
        sender: "Vercel Support",
        email: "support@vercel.com",
        subject: "Déploiement réussi sur production",
        snippet: "Votre projet monolith-client-v16 a été déployé avec succès. Les certificats SSL et la configuration CDN ont été mis en ligne.",
        body: `<p>Félicitations,</p>
               <p>Le déploiement de votre projet <strong>monolith-client-v16</strong> s'est déroulé sans aucune erreur. Toutes les routes sont opérationnelles et les métriques de performance sont optimales (100/100 Lighthouse score).</p>
               <p><strong>Détails du déploiement :</strong></p>
               <table class="w-full text-left my-4 border-collapse text-xs">
                 <thead>
                   <tr class="border-b border-custom">
                     <th class="py-2">Branche</th>
                     <th class="py-2">Commit</th>
                     <th class="py-2">Temps de build</th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr>
                     <td class="py-2">main</td>
                     <td class="py-2 font-mono">a8d29f0</td>
                     <td class="py-2">42 secondes</td>
                   </tr>
                 </tbody>
               </table>
               <p>Merci d'avoir choisi Vercel.</p>`,
        date: "Hier",
        unread: false,
        starred: true,
        folder: "inbox"
      },
      {
        id: 3,
        sender: "Sarah Martin",
        email: "sarah.m@design-studio.co",
        subject: "Retour sur la maquette minimaliste",
        snippet: "Salut, j'ai passé en revue la dernière itération. C'est propre, sobre, mais il manque peut-être un peu de contraste sur la barre de recherche.",
        body: `<p>Salut,</p>
               <p>J'adore vraiment l'ambiance sobre et minimaliste du client mail. La structure en trois colonnes est classique mais l'utilisation du contraste sombre/clair et de la typographie donne un aspect haut de gamme.</p>
               <p>J'aurais juste une petite suggestion : pourrions-nous augmenter légèrement le contraste des bordures ou adoucir le fond des inputs pour une meilleure visibilité ?</p>
               <p>On s'appelle à 14h pour en parler ?</p>
               <p>Amicalement,<br>Sarah</p>`,
        date: "28 juin",
        unread: true,
        starred: false,
        folder: "inbox"
      },
      {
        id: 4,
        sender: "Co-working Space",
        email: "contact@cowork-paris.fr",
        subject: "Facture acquittée - Juin 2026",
        snippet: "Votre reçu de paiement pour la location de votre bureau privatif est disponible en pièce jointe.",
        body: `<p>Bonjour,</p>
               <p>Nous vous remercions pour votre règlement. Votre abonnement pour le mois de Juin 2026 a bien été validé.</p>
               <p>Vous trouverez ci-joint votre reçu au format PDF.</p>
               <p>Cordialement,<br>L'équipe d'accueil</p>`,
        date: "25 juin",
        unread: false,
        starred: false,
        folder: "archive"
      }
    ];

    // Initialize application
    function init() {
      // Load saved theme or default to dark
      const isLight = localStorage.getItem('theme') === 'light';
      if (isLight) {
        document.documentElement.classList.add('light');
        document.getElementById('theme-icon-dark').classList.remove('hidden');
        document.getElementById('theme-icon-light').classList.add('hidden');
      }
      render();
    }

    // Toggle Light/Dark Mode
    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      
      const iconDark = document.getElementById('theme-icon-dark');
      const iconLight = document.getElementById('theme-icon-light');
      
      if (isLight) {
        iconDark.classList.remove('hidden');
        iconLight.classList.add('hidden');
      } else {
        iconDark.classList.add('hidden');
        iconLight.classList.remove('hidden');
      }
    }

    // Switch active navigation folder
    function switchFolder(folder) {
      currentFolder = folder;
      
      // Update sidebar buttons UI classes
      const foldersList = ['inbox', 'starred', 'sent', 'drafts', 'archive'];
      foldersList.forEach(f => {
        const btn = document.getElementById(`folder-${f}`);
        if (btn) {
          if (f === folder) {
            btn.className = "folder-active flex items-center justify-between px-3 py-2 rounded-md text-xs transition-colors";
          } else {
            btn.className = "flex items-center justify-between px-3 py-2 rounded-md text-xs text-custom-sec hover:bg-[var(--accent-dim)] transition-colors";
          }
        }
      });

      // Update active folder labels
      const label = document.getElementById('active-folder-label');
      if (folder === 'inbox') label.innerText = "Boîte de réception";
      if (folder === 'starred') label.innerText = "Messages suivis";
      if (folder === 'sent') label.innerText = "Messages envoyés";
      if (folder === 'drafts') label.innerText = "Brouillons";
      if (folder === 'archive') label.innerText = "Archives";

      // Select first email of new list if available
      const filtered = getFilteredEmails();
      if (filtered.length > 0) {
        currentSelectedId = filtered[0].id;
      } else {
        currentSelectedId = null;
      }

      render();
    }

    // Filter emails helper
    function getFilteredEmails() {
      return emails.filter(email => {
        // Folder check
        if (currentFolder === 'starred' && !email.starred) return false;
        if (currentFolder !== 'starred' && email.folder !== currentFolder) return false;

        // Search check
        if (searchQuery.trim() !== '') {
          const q = searchQuery.toLowerCase();
          return email.sender.toLowerCase().includes(q) || 
                 email.subject.toLowerCase().includes(q) || 
                 email.snippet.toLowerCase().includes(q);
        }
        return true;
      });
    }

    // Handle search input
    function filterEmails(val) {
      searchQuery = val;
      render();
    }

    // Select an email from list
    function selectEmail(id) {
      currentSelectedId = id;
      // Mark as read automatically when selecting
      const email = emails.find(e => e.id === id);
      if (email && email.unread) {
        email.unread = false;
        updateBadges();
      }
      render();
    }

    // Action: Star/Unstar
    function toggleStar() {
      const email = emails.find(e => e.id === currentSelectedId);
      if (email) {
        email.starred = !email.starred;
        showToast(email.starred ? "Message ajouté aux suivis" : "Message retiré des suivis");
        render();
      }
    }

    // Action: Archive
    function archiveEmail() {
      const email = emails.find(e => e.id === currentSelectedId);
      if (email) {
        email.folder = email.folder === 'archive' ? 'inbox' : 'archive';
        showToast(email.folder === 'archive' ? "Message archivé" : "Message déplacé dans la boîte de réception");
        
        // Select next or fallback
        const filtered = getFilteredEmails();
        if (filtered.length > 0) {
          currentSelectedId = filtered[0].id;
        } else {
          currentSelectedId = null;
        }
        render();
      }
    }

    // Action: Mark Unread
    function toggleUnread() {
      const email = emails.find(e => e.id === currentSelectedId);
      if (email) {
        email.unread = !email.unread;
        showToast(email.unread ? "Marqué comme non lu" : "Marqué comme lu");
        render();
      }
    }

    // Action: Reply (fills compose and opens modal)
    function replyToEmail() {
      const email = emails.find(e => e.id === currentSelectedId);
      if (email) {
        document.getElementById('compose-to').value = email.email;
        document.getElementById('compose-subject').value = "Re: " + email.subject;
        document.getElementById('compose-body').value = `\n\n--- Le ${email.date}, ${email.sender} a écrit ---\n> ${email.snippet}`;
        toggleCompose(true);
      }
    }

    // Toggle Compose Modal
    function toggleCompose(show) {
      const modal = document.getElementById('compose-modal');
      if (show) {
        modal.classList.remove('hidden');
        setTimeout(() => {
          modal.classList.remove('opacity-0');
          modal.querySelector('.transform').classList.remove('scale-95');
        }, 10);
      } else {
        modal.classList.add('opacity-0');
        modal.querySelector('.transform').classList.add('scale-95');
        setTimeout(() => {
          modal.classList.add('hidden');
        }, 300);
      }
    }

    // Submit Compose Form
    function sendForm(e) {
      e.preventDefault();
      const to = document.getElementById('compose-to').value;
      const subject = document.getElementById('compose-subject').value;
      const bodyText = document.getElementById('compose-body').value;

      // Add to sent folder mockup
      const newMail = {
        id: emails.length + 1,
        sender: to.split('@')[0],
        email: to,
        subject: subject,
        snippet: bodyText.substring(0, 100),
        body: `<p>${bodyText.replace(/\n/g, '<br>')}</p>`,
        date: "À l'instant",
        unread: false,
        starred: false,
        folder: "sent"
      };

      emails.unshift(newMail);
      toggleCompose(false);
      
      // Reset fields
      document.getElementById('compose-form').reset();
      
      showToast("Message envoyé avec succès");
      switchFolder('sent');
    }

    // Show Notification Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 2500);
    }

    // Update Folder count badges
    function updateBadges() {
      const inboxUnread = emails.filter(e => e.folder === 'inbox' && e.unread).length;
      const starredCount = emails.filter(e => e.starred).length;
      
      const inboxBadge = document.getElementById('badge-inbox');
      if (inboxBadge) inboxBadge.innerText = inboxUnread;

      const starredBadge = document.getElementById('badge-starred');
      if (starredBadge) starredBadge.innerText = starredCount;
    }

    // Core Render Engine
    function render() {
      updateBadges();

      const filtered = getFilteredEmails();
      const countEl = document.getElementById('message-count');
      countEl.innerText = `${filtered.length} message${filtered.length > 1 ? 's' : ''}`;

      // 1. Render message list
      const listContainer = document.getElementById('email-list');
      listContainer.innerHTML = '';

      if (filtered.length === 0) {
        listContainer.innerHTML = `
          <div class="h-64 flex flex-col items-center justify-center text-center p-6">
            <svg class="w-8 h-8 text-custom-muted mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0l-8 5-8-5"/></svg>
            <span class="text-xs text-custom-sec">Aucun message dans ce dossier</span>
          </div>
        `;
      } else {
        filtered.forEach(email => {
          const isActive = email.id === currentSelectedId;
          const isUnread = email.unread;
          
          const item = document.createElement('div');
          item.onclick = () => selectEmail(email.id);
          item.className = `p-5 cursor-pointer border-l-2 border-transparent transition-all duration-150 relative ${isActive ? 'msg-active' : 'hover:bg-[var(--accent-dim)]'}`;
          
          item.innerHTML = `
            <div class="flex items-center justify-between mb-1.5 gap-2">
              <span class="text-xs font-semibold truncate ${isUnread ? 'text-[var(--text-primary)] font-bold' : 'text-custom-sec font-medium'}">${email.sender}</span>
              <span class="text-[10px] font-mono text-custom-muted whitespace-nowrap shrink-0">${email.date}</span>
            </div>
            <h4 class="text-xs font-medium truncate mb-1 ${isUnread ? 'text-[var(--text-primary)] font-bold' : 'text-custom-sec'}">${email.subject}</h4>
            <p class="text-xs text-custom-muted line-clamp-2 leading-relaxed">${email.snippet}</p>
            
            ${isUnread ? `<span class="absolute top-6 right-5 w-1.5 h-1.5 rounded-full bg-[var(--accent-blue)]"></span>` : ''}
          `;
          listContainer.appendChild(item);
        });
      }

      // 2. Render active message details in the reader pane
      const readerContainer = document.getElementById('reader-content');
      const activeEmail = emails.find(e => e.id === currentSelectedId);
      
      const starIcon = document.getElementById('star-icon');
      if (activeEmail && activeEmail.starred) {
        starIcon.setAttribute('fill', 'currentColor');
        starIcon.classList.add('text-yellow-500');
        starIcon.classList.remove('text-custom-sec');
      } else {
        starIcon.setAttribute('fill', 'none');
        starIcon.classList.remove('text-yellow-500');
        starIcon.classList.add('text-custom-sec');
      }

      if (!activeEmail) {
        readerContainer.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center text-center">
            <svg class="w-12 h-12 text-custom-muted mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-2.25-1.5a2 2 0 00-2.25 0l-2.25 1.5"/></svg>
            <h3 class="text-sm font-medium">Aucun message sélectionné</h3>
            <p class="text-xs text-custom-muted mt-1">Choisissez un message dans la liste pour afficher son contenu.</p>
          </div>
        `;
      } else {
        readerContainer.innerHTML = `
          <div class="max-w-3xl w-full mx-auto flex flex-col gap-6">
            
            <!-- Metadata & Header -->
            <div class="flex flex-col gap-4 border-b border-custom pb-6">
              <h2 class="text-xl lg:text-2xl font-semibold tracking-tight leading-tight">${activeEmail.subject}</h2>
              
              <div class="flex items-center justify-between gap-4 flex-wrap">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded-full bg-custom-tert border border-custom flex items-center justify-center font-bold text-xs">
                    ${activeEmail.sender.substring(0, 2).toUpperCase()}
                  </div>
                  <div class="flex flex-col min-w-0">
                    <span class="text-xs font-semibold">${activeEmail.sender}</span>
                    <span class="text-[10px] text-custom-muted truncate">${activeEmail.email}</span>
                  </div>
                </div>
                <div class="text-[10px] font-mono text-custom-muted">
                  Reçu le ${activeEmail.date}
                </div>
              </div>
            </div>

            <!-- Email Body Content -->
            <div class="text-xs lg:text-sm text-custom-sec leading-relaxed flex flex-col gap-4">
              ${activeEmail.body}
            </div>

          </div>
        `;
      }
    }

    // Boot app
    init();
  </script>
</body>
</html>
