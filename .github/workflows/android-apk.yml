name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "src/mobile/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/mobile/package-lock.json

      - name: Install mobile deps
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 14742923

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew --no-daemon assembleDebug

      - name: Publish APK in repository
        working-directory: .
        run: |
          mkdir -p releases/android
          cp src/mobile/android/app/build/outputs/apk/debug/app-debug.apk releases/android/SimpleMail-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f releases/android/SimpleMail-debug.apk
          if git diff --cached --quiet; then
            echo "APK already up to date"
          else
            git commit -m "Build Android APK"
            git push
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simplemail-debug-apk
          path: src/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
